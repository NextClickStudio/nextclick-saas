<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AI Advisor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font,'Inter'),sans-serif;background:var(--bg,'#fff');color:var(--text,'#0A0A0A');min-height:100vh;overflow-x:hidden}

/* ── LAYOUT ── */
.widget{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;padding:0 0 40px}
.phase{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:32px 20px;text-align:center}
.phase.active{display:flex}

/* ── HEADER ── */
.widget-header{padding:20px;text-align:center;border-bottom:1px solid rgba(0,0,0,.08)}
.brand-logo{max-height:44px;margin-bottom:8px;object-fit:contain}
.brand-name{font-size:1.3rem;font-weight:800;color:var(--primary,'#0A0A0A')}

/* ── HERO ── */
.hero-title{font-size:clamp(1.6rem,5vw,2.2rem);font-weight:800;color:var(--primary,'#0A0A0A');line-height:1.2;margin-bottom:10px}
.hero-sub{font-size:.95rem;opacity:.65;margin-bottom:32px}
.cta-btn{background:var(--btn-bg,'#0A0A0A');color:var(--btn-text,'#fff');border:none;border-radius:var(--radius,'8px');padding:16px 32px;font-size:1rem;font-weight:700;cursor:pointer;width:100%;max-width:300px;transition:opacity .2s}
.cta-btn:hover{opacity:.85}

/* ── QUESTIONS ── */
.question-title{font-size:1.1rem;font-weight:700;margin-bottom:20px;color:var(--primary)}
.options{width:100%;max-width:420px}
.option{display:block;width:100%;padding:14px 18px;margin-bottom:10px;border:2px solid rgba(0,0,0,.12);border-radius:var(--radius,'8px');background:#fff;cursor:pointer;text-align:left;font-size:.95rem;transition:all .18s}
.option:hover,.option.selected{border-color:var(--primary,'#0A0A0A');background:var(--primary,'#0A0A0A');color:var(--btn-text,'#fff')}
.text-input{width:100%;padding:14px;border:2px solid rgba(0,0,0,.12);border-radius:var(--radius,'8px');font-size:.95rem;font-family:inherit;resize:vertical;min-height:100px}
.text-input:focus{outline:none;border-color:var(--primary)}

/* ── NAV ── */
.nav{display:flex;gap:12px;width:100%;max-width:420px;margin-top:24px}
.nav-btn{flex:1;padding:12px;border:2px solid var(--primary,'#0A0A0A');border-radius:var(--radius,'8px');background:transparent;color:var(--primary,'#0A0A0A');font-weight:600;cursor:pointer;transition:.18s}
.nav-btn.primary{background:var(--primary,'#0A0A0A');color:var(--btn-text,'#fff')}
.nav-btn:disabled{opacity:.35;cursor:default}

/* ── PROGRESS ── */
.progress-bar{height:3px;background:rgba(0,0,0,.08);width:100%}
.progress-fill{height:100%;background:var(--primary,'#0A0A0A');transition:width .3s}

/* ── LOADING ── */
.loading-wrap{text-align:center}
.loading-spinner{width:48px;height:48px;border:4px solid rgba(0,0,0,.1);border-top-color:var(--primary,'#0A0A0A');border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:1rem;opacity:.7}

/* ── RESULTS ── */
.result-intro{font-size:.95rem;line-height:1.7;margin-bottom:24px;opacity:.8;text-align:left;max-width:440px}
.section-title{font-size:1rem;font-weight:700;color:var(--primary);margin:20px 0 12px;text-align:left;width:100%}
.step-item{display:flex;gap:14px;align-items:flex-start;padding:14px;border:1px solid rgba(0,0,0,.08);border-radius:var(--radius,'8px');margin-bottom:10px;width:100%;text-align:left}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--primary);color:var(--btn-text,'#fff');display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0}
.step-action{font-weight:600;font-size:.9rem}
.step-tip{font-size:.82rem;opacity:.65;margin-top:3px}
.product-card{display:flex;gap:14px;align-items:flex-start;padding:14px;border:1px solid rgba(0,0,0,.1);border-radius:var(--radius,'8px');margin-bottom:10px;width:100%;text-align:left;text-decoration:none;color:inherit;transition:border-color .18s;cursor:pointer}
.product-card:hover{border-color:var(--primary)}
.product-img{width:64px;height:64px;object-fit:cover;border-radius:4px;flex-shrink:0;background:#f5f5f5}
.product-title{font-weight:700;font-size:.9rem}
.product-reason{font-size:.8rem;opacity:.65;margin-top:4px;line-height:1.5}
.product-price{font-weight:700;color:var(--primary);margin-top:6px;font-size:.9rem}

/* ── LIMIT ── */
.limit-box{text-align:center;padding:40px 20px}
.limit-icon{font-size:48px;margin-bottom:16px}

/* ── RESTART ── */
.restart-btn{margin-top:20px;padding:12px 24px;border:2px solid var(--primary);border-radius:var(--radius,'8px');background:transparent;color:var(--primary);font-weight:600;cursor:pointer}
</style>
</head>
<body>
<div class="widget">
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

  <!-- HEADER -->
  <div class="widget-header" id="header">
    <img id="logoImg" class="brand-logo" src="" alt="" style="display:none"/>
    <div id="brandName" class="brand-name"></div>
  </div>

  <!-- PHASE 1: HERO -->
  <div class="phase active" id="phase-hero">
    <div class="hero-title" id="heroTitle">Trova la tua routine perfetta</div>
    <div class="hero-sub" id="heroSub">Personalizzata per te dall'intelligenza artificiale</div>
    <button class="cta-btn" id="startBtn">Inizia ora →</button>
  </div>

  <!-- PHASE 2: QUESTIONS (rendered dynamically) -->
  <div class="phase" id="phase-questions">
    <div class="question-title" id="questionTitle"></div>
    <div class="options" id="optionsContainer"></div>
    <div class="nav">
      <button class="nav-btn" id="backBtn">← Indietro</button>
      <button class="nav-btn primary" id="nextBtn">Avanti →</button>
    </div>
  </div>

  <!-- PHASE 3: LOADING -->
  <div class="phase" id="phase-loading">
    <div class="loading-wrap">
      <div class="loading-spinner"></div>
      <div class="loading-text" id="loadingText">Sto analizzando il tuo profilo...</div>
    </div>
  </div>

  <!-- PHASE 4: RESULTS -->
  <div class="phase" id="phase-results" style="align-items:flex-start;min-height:auto;padding-top:20px">
    <div class="result-intro" id="resultIntro"></div>
    <div id="resultContent" style="width:100%"></div>
    <button class="restart-btn" id="restartBtn">↺ Ricomincia</button>
  </div>

  <!-- PHASE 5: LIMIT REACHED -->
  <div class="phase" id="phase-limit">
    <div class="limit-box">
      <div class="limit-icon">⚠️</div>
      <div class="hero-title" style="font-size:1.4rem">Limite raggiunto</div>
      <div id="limitMsg" class="hero-sub" style="margin-top:8px">Il numero di consulenze gratuite disponibili è esaurito per oggi. Torna presto!</div>
    </div>
  </div>
</div>

<script>
const API = '%%API_HOST%%';
const params = new URLSearchParams(location.search);
const SHOP = params.get('shop') || new URLSearchParams(location.search).get('shop');

let shopConfig = null;
let flow = [];
let answers = {};
let currentStep = 0;
let generationId = null;
const SESSION = Math.random().toString(36).slice(2);

// ── INIT ──
async function init() {
  try {
    const res = await fetch(`${API}/api/widget/config?shop=${SHOP}`);
    const data = await res.json();

    if (data.error === 'inactive' || data.error === 'plan_inactive') {
      document.getElementById('limitMsg').textContent = data.message || 'Piano non attivo. Contatta il merchant per abilitare il widget.';
      showPhase('phase-limit');
      return;
    }

    shopConfig = data;
    flow = (data.config.questionFlow && data.config.questionFlow.length > 0) ? data.config.questionFlow : defaultFlow();
    applyTheme(data.config);
    populateUI(data.config);

    if (data.generationsRemaining <= 0) {
      showPhase('phase-limit');
      return;
    }

    showPhase('phase-hero');
  } catch(e) {
    console.error('Widget init error:', e);
  }
}

function applyTheme(cfg) {
  const r = document.documentElement.style;
  r.setProperty('--primary',   cfg.primaryColor || '#0A0A0A');
  r.setProperty('--secondary', cfg.secondaryColor || '#00E676');
  r.setProperty('--bg',        cfg.bgColor || '#ffffff');
  r.setProperty('--text',      cfg.textColor || '#0A0A0A');
  r.setProperty('--btn-bg',    cfg.buttonColor || '#0A0A0A');
  r.setProperty('--btn-text',  cfg.buttonTextColor || '#ffffff');
  r.setProperty('--radius',    cfg.borderRadius || '8px');
  r.setProperty('--font',      cfg.fontFamily || 'Inter');
  document.body.style.fontFamily = cfg.fontFamily || 'Inter';

  // Load Google Font
  if (cfg.fontFamily && cfg.fontFamily !== 'Inter') {
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(cfg.fontFamily)}:wght@400;600;700;800&display=swap`;
    document.head.appendChild(link);
  }
}

function populateUI(cfg) {
  document.title = cfg.brandName || 'AI Advisor';
  document.getElementById('brandName').textContent = cfg.brandName || '';
  document.getElementById('heroTitle').textContent = cfg.heroTitle || 'Trova la tua routine perfetta';
  document.getElementById('heroSub').textContent = cfg.heroSubtitle || '';
  document.getElementById('startBtn').textContent = (cfg.ctaText || 'Inizia ora') + ' →';
  document.getElementById('loadingText').textContent = cfg.loadingText || 'Sto analizzando il tuo profilo...';

  if (cfg.logoUrl) {
    const img = document.getElementById('logoImg');
    img.src = cfg.logoUrl;
    img.style.display = 'block';
  }
}

// ── FLOW ──
function showPhase(id) {
  document.querySelectorAll('.phase').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  updateProgress();
}

function updateProgress() {
  const pct = flow.length > 0 ? Math.round((currentStep / flow.length) * 100) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function renderQuestion() {
  const step = flow[currentStep];
  if (!step) return;

  document.getElementById('questionTitle').textContent = step.title;
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';

  if (step.type === 'text') {
    const ta = document.createElement('textarea');
    ta.className = 'text-input';
    ta.placeholder = step.placeholder || '';
    ta.value = answers[step.id] || '';
    ta.addEventListener('input', () => { answers[step.id] = ta.value; });
    container.appendChild(ta);

  } else if (step.type === 'slider') {
    const val = answers[step.id] || step.min || 0;
    const slider = document.createElement('input');
    slider.type = 'range';
    slider.min = step.min || 0;
    slider.max = step.max || 100;
    slider.value = val;
    slider.style.cssText = 'width:100%;accent-color:var(--primary)';
    const label = document.createElement('div');
    label.textContent = val;
    label.style.cssText = 'text-align:center;font-size:1.4rem;font-weight:700;margin-top:8px';
    slider.addEventListener('input', () => { answers[step.id] = slider.value; label.textContent = slider.value; });
    container.appendChild(slider);
    container.appendChild(label);

  } else {
    const currentVal = answers[step.id];
    const selected = Array.isArray(currentVal) ? currentVal : (currentVal ? [currentVal] : []);

    (step.options || []).forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option' + (selected.includes(opt) ? ' selected' : '');
      btn.textContent = opt;
      btn.addEventListener('click', () => {
        if (step.type === 'multi') {
          const idx = selected.indexOf(opt);
          if (idx > -1) selected.splice(idx, 1); else selected.push(opt);
          answers[step.id] = [...selected];
        } else {
          answers[step.id] = opt;
        }
        renderQuestion();
        // Auto-advance on single select
        if (step.type === 'single') setTimeout(() => nextStep(), 220);
      });
      container.appendChild(btn);
    });
  }

  showPhase('phase-questions');
}

function nextStep() {
  if (currentStep < flow.length - 1) {
    currentStep++;
    renderQuestion();
  } else {
    generate();
  }
}

function prevStep() {
  if (currentStep > 0) { currentStep--; renderQuestion(); }
  else showPhase('phase-hero');
}

// ── GENERATE ──
async function generate() {
  showPhase('phase-loading');
  try {
    const res = await fetch(`${API}/api/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-shop-domain': SHOP },
      body: JSON.stringify({ answers, sessionId: SESSION }),
    });
    const data = await res.json();

    if (data.error === 'generation_limit_reached') {
      showPhase('phase-limit');
      return;
    }
    if (!res.ok) throw new Error(data.message || 'Errore generazione');

    generationId = data.generationId;
    renderResults(data);
    showPhase('phase-results');

  } catch(e) {
    alert(e.message || 'Si è verificato un errore. Riprova.');
    showPhase('phase-questions');
  }
}

function renderResults(data) {
  document.getElementById('resultIntro').textContent = data.message || '';
  const content = document.getElementById('resultContent');
  content.innerHTML = '';

  // Routine sections (Pro/Scale)
  if (data.sections && data.sections.length > 0) {
    data.sections.forEach(section => {
      const secTitle = document.createElement('div');
      secTitle.className = 'section-title';
      secTitle.textContent = section.title;
      content.appendChild(secTitle);

      (section.steps || []).forEach((step, i) => {
        const item = document.createElement('div');
        item.className = 'step-item';
        item.innerHTML = `
          <div class="step-num">${step.order || i+1}</div>
          <div>
            <div class="step-action">${step.action}</div>
            ${step.tip ? `<div class="step-tip">💡 ${step.tip}</div>` : ''}
          </div>`;
        content.appendChild(item);
      });
    });
  }

  // Products
  if (data.products && data.products.length > 0) {
    const prodTitle = document.createElement('div');
    prodTitle.className = 'section-title';
    prodTitle.textContent = data.sections?.length > 0 ? '🛒 Prodotti consigliati' : '✨ La tua selezione personalizzata';
    content.appendChild(prodTitle);

    data.products.forEach(product => {
      const card = document.createElement('a');
      card.className = 'product-card';
      card.href = product.url;
      card.target = '_top';
      card.innerHTML = `
        ${product.imageUrl ? `<img class="product-img" src="${product.imageUrl}" alt="${product.title}"/>` : '<div class="product-img"></div>'}
        <div>
          <div class="product-title">${product.title}</div>
          ${product.reason ? `<div class="product-reason">${product.reason}</div>` : ''}
          ${product.price ? `<div class="product-price">€${product.price.toFixed(2)}</div>` : ''}
        </div>`;
      card.addEventListener('click', () => trackClick(product));
      content.appendChild(card);
    });
  }
}

async function trackClick(product) {
  if (!generationId) return;
  fetch(`${API}/api/generate/click`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ generationId, shopifyId: product.shopifyId, productTitle: product.title, price: product.price }),
  }).catch(() => {});
}

// ── DEFAULT FLOW ──
function defaultFlow() {
  return [
    { id: 'goal', title: 'Qual è il tuo obiettivo principale?', type: 'multi', options: ['Idratazione', 'Anti-età', 'Luminosità', 'Imperfezioni', 'Lenitivo'] },
    { id: 'skintype', title: 'Qual è il tuo tipo di pelle?', type: 'single', options: ['Secca', 'Normale', 'Grassa', 'Mista', 'Sensibile'] },
    { id: 'budget', title: 'Budget per prodotto?', type: 'single', options: ['Fino a €20', '€20-€40', '€40-€60', 'Oltre €60'] },
    { id: 'notes', title: 'Vuoi aggiungere qualcosa?', type: 'text', placeholder: 'Allergie, preferenze particolari...' },
  ];
}

// ── EVENTS ──
document.getElementById('startBtn').addEventListener('click', () => {
  currentStep = 0;
  answers = {};
  renderQuestion();
});
document.getElementById('nextBtn').addEventListener('click', nextStep);
document.getElementById('backBtn').addEventListener('click', prevStep);
document.getElementById('restartBtn').addEventListener('click', () => {
  currentStep = 0;
  answers = {};
  generationId = null;
  showPhase('phase-hero');
});

// ── START ──
init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>AI Advisor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=block" rel="stylesheet"/>
<style>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --p:#0A0A0A;--s:#C8A96E;--bg:#FAFAF8;--text:#0A0A0A;
  --btn:#0A0A0A;--btntxt:#FFFFFF;--r:2px;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'DM Sans',sans-serif;
  --border:rgba(0,0,0,0.10);
  --muted:#888;
}

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans)}

/* SHELL — fixed full viewport, no scroll except results */
#shell{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  max-width:500px;margin:0 auto;
  background:var(--bg);
}

/* TOPBAR */
#topbar{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 24px 14px;
  border-bottom:1px solid var(--border);
}
#brandName{font-family:var(--serif);font-size:1.05rem;font-weight:600;letter-spacing:.01em}
#brandLogo{max-height:28px;object-fit:contain;display:none}
#topTag{font-family:var(--sans);font-size:.6rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}

/* PROGRESS */
#progressBar{flex-shrink:0;height:1.5px;background:rgba(0,0,0,.07)}
#progressFill{height:100%;background:var(--s);transition:width .5s cubic-bezier(.4,0,.2,1);width:0%}

/* PHASES — each takes remaining space */
.phase{display:none;flex:1;flex-direction:column;overflow:hidden}
.phase.active{display:flex}

/* ── HERO ── */
#phase-hero{
  justify-content:space-between;
  padding:0 24px 28px;
}
.hero-top{
  flex:1;display:flex;flex-direction:column;justify-content:center;
  padding-bottom:16px;
}
.hero-eyebrow{
  font-size:.6rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;
  color:var(--s);margin-bottom:18px;
}
.hero-title{
  font-family:var(--serif);
  font-size:clamp(2rem,6vw,2.8rem);
  font-weight:400;line-height:1.12;
  color:var(--p);margin-bottom:14px;
}
.hero-title em{font-style:italic;color:var(--s)}
.hero-sub{
  font-size:.82rem;line-height:1.7;color:var(--muted);
  max-width:320px;
}
.hero-bottom{}
.cta-btn{
  width:100%;padding:15px 24px;
  background:var(--btn);color:var(--btntxt);border:none;
  font-family:var(--sans);font-size:.75rem;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;
  cursor:pointer;border-radius:var(--r);
  display:flex;align-items:center;justify-content:space-between;
  transition:opacity .2s;
}
.cta-btn:hover{opacity:.88}
.cta-arrow{font-size:1rem;font-weight:300}

/* ── QUESTIONS ── */
#phase-questions{padding:0 24px 20px}
.q-header{flex-shrink:0;padding:20px 0 16px}
.q-step{font-size:.6rem;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--s);margin-bottom:10px}
.q-title{font-family:var(--serif);font-size:1.55rem;font-weight:400;line-height:1.2;color:var(--p)}
.q-title em{font-style:italic}

/* OPTIONS — fills remaining space */
.options-wrap{flex:1;overflow:hidden;display:flex;align-items:center}
.options{
  width:100%;
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
}
.options.col1{grid-template-columns:1fr}

.opt{
  padding:14px 16px 14px 14px;
  border:1px solid var(--border);
  background:#fff;
  cursor:pointer;text-align:left;
  font-family:var(--sans);font-size:.82rem;font-weight:400;
  color:var(--text);
  border-radius:var(--r);
  display:flex;align-items:center;justify-content:space-between;
  transition:border-color .15s,background .15s;
  line-height:1.3;
}
.opt:hover{border-color:rgba(0,0,0,.3)}
.opt.sel{border-color:var(--p);background:var(--p);color:#fff}
.opt .dot{
  width:14px;height:14px;border-radius:50%;
  border:1.5px solid var(--border);flex-shrink:0;margin-left:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;transition:.15s;
}
.opt.sel .dot{border-color:#fff;background:#fff;color:var(--p)}

textarea.opt{
  resize:none;min-height:90px;align-items:flex-start;
  font-family:var(--sans);outline:none;
}
textarea.opt:focus{border-color:var(--p)}

/* NAV */
.q-nav{
  flex-shrink:0;display:flex;gap:8px;padding-top:16px;
}
.nav-btn{
  flex:1;padding:13px;border:1px solid var(--border);
  background:transparent;color:var(--text);
  font-family:var(--sans);font-size:.72rem;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;border-radius:var(--r);transition:.15s;
}
.nav-btn.primary{background:var(--btn);color:var(--btntxt);border-color:var(--btn)}
.nav-btn:hover:not(:disabled){opacity:.8}
.nav-btn:disabled{opacity:.28;cursor:default}

/* ── LOADING ── */
#phase-loading{align-items:center;justify-content:center;gap:20px}
.load-bar{width:56px;height:1.5px;background:rgba(0,0,0,.1);position:relative;overflow:hidden}
.load-bar::after{content:'';position:absolute;left:-100%;top:0;width:100%;height:100%;background:var(--s);animation:sweep 1.1s ease-in-out infinite}
@keyframes sweep{0%{left:-100%}100%{left:100%}}
.load-eyebrow{font-size:.6rem;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--s)}
#loadingText{font-family:var(--serif);font-size:1.2rem;font-weight:400;font-style:italic;color:var(--p)}

/* ── RESULTS — scrollable ── */
#phase-results{overflow-y:auto;padding:20px 24px 40px}
#phase-results::-webkit-scrollbar{width:3px}
#phase-results::-webkit-scrollbar-thumb{background:var(--border)}
.res-intro{
  font-size:.82rem;line-height:1.8;color:var(--muted);
  padding-bottom:20px;border-bottom:1px solid var(--border);margin-bottom:20px;
}
.sec-label{
  font-size:.58rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;
  color:var(--s);margin-bottom:12px;margin-top:24px;
}
.sec-label:first-child{margin-top:0}

.step-item{
  display:flex;gap:12px;align-items:flex-start;
  padding:14px;border:1px solid var(--border);background:#fff;
  margin-bottom:7px;border-radius:var(--r);
}
.step-n{
  width:22px;height:22px;border-radius:50%;
  background:var(--p);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:.62rem;font-weight:700;flex-shrink:0;letter-spacing:.02em;
}
.step-act{font-size:.82rem;font-weight:600;line-height:1.35}
.step-tip{font-size:.73rem;color:var(--muted);margin-top:3px;line-height:1.5}

.prod-card{
  display:flex;gap:12px;align-items:center;
  padding:14px;border:1px solid var(--border);background:#fff;
  margin-bottom:7px;border-radius:var(--r);
  text-decoration:none;color:inherit;
  transition:border-color .15s;cursor:pointer;
}
.prod-card:hover{border-color:var(--p)}
.prod-img{
  width:52px;height:52px;object-fit:cover;
  flex-shrink:0;background:var(--bg);
  border:1px solid var(--border);border-radius:var(--r);
}
.prod-info{flex:1;min-width:0}
.prod-title{font-size:.82rem;font-weight:600;line-height:1.3;margin-bottom:3px}
.prod-reason{font-size:.72rem;color:var(--muted);line-height:1.5}
.prod-price{font-size:.82rem;font-weight:700;color:var(--p);margin-top:5px}
.prod-arrow{color:var(--muted);font-size:.9rem;flex-shrink:0;margin-left:4px}

.restart-btn{
  margin-top:28px;width:100%;padding:13px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);font-family:var(--sans);font-size:.68rem;
  font-weight:500;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;border-radius:var(--r);transition:.15s;
}
.restart-btn:hover{border-color:var(--p);color:var(--p)}

/* ── LIMIT ── */
#phase-limit{align-items:center;justify-content:center;padding:40px 24px;text-align:center;gap:12px}
.limit-title{font-family:var(--serif);font-size:1.6rem;font-weight:400}
.limit-sub{font-size:.82rem;color:var(--muted);line-height:1.7;max-width:300px}
</style>
</head>
<body>
<div id="shell">
  <div id="topbar">
    <div>
      <img id="brandLogo" src="" alt=""/>
      <div id="brandName"></div>
    </div>
    <div id="topTag">AI Advisor</div>
  </div>
  <div id="progressBar"><div id="progressFill"></div></div>

  <!-- HERO -->
  <div class="phase active" id="phase-hero">
    <div class="hero-top">
      <div class="hero-eyebrow">Personalizzazione AI</div>
      <div class="hero-title" id="heroTitle">Trova la tua <em>routine perfetta</em></div>
      <div class="hero-sub" id="heroSub">Analisi personalizzata in pochi secondi, basata sul tuo profilo unico.</div>
    </div>
    <div class="hero-bottom">
      <button class="cta-btn" id="startBtn">
        <span id="ctaText">Inizia ora</span>
        <span class="cta-arrow">→</span>
      </button>
    </div>
  </div>

  <!-- QUESTIONS -->
  <div class="phase" id="phase-questions">
    <div class="q-header">
      <div class="q-step" id="stepLabel">Step 01</div>
      <div class="q-title" id="qTitle"></div>
    </div>
    <div class="options-wrap">
      <div class="options" id="opts"></div>
    </div>
    <div class="q-nav">
      <button class="nav-btn" id="backBtn">← Back</button>
      <button class="nav-btn primary" id="nextBtn">Next →</button>
    </div>
  </div>

  <!-- LOADING -->
  <div class="phase" id="phase-loading">
    <div class="load-bar"></div>
    <div class="load-eyebrow">Analisi in corso</div>
    <div id="loadingText">Sto analizzando il tuo profilo...</div>
  </div>

  <!-- RESULTS -->
  <div class="phase" id="phase-results">
    <div class="res-intro" id="resIntro"></div>
    <div id="resContent"></div>
    <button class="restart-btn" id="restartBtn">↺ Ricomincia dall'inizio</button>
  </div>

  <!-- LIMIT -->
  <div class="phase" id="phase-limit">
    <div class="limit-title">Limite raggiunto</div>
    <div class="limit-sub" id="limitMsg">Consulenze esaurite per oggi. Torna presto!</div>
  </div>
</div>

<script>
const API='%%API_HOST%%';
const SHOP=new URLSearchParams(location.search).get('shop');
let flow=[],answers={},step=0,genId=null;
const SID=Math.random().toString(36).slice(2);

async function init(){
  document.getElementById('shell').style.visibility='hidden';
  try{
    const r=await fetch(`${API}/api/widget/config?shop=${SHOP}`);
    const d=await r.json();
    if(d.error==='inactive'||d.error==='plan_inactive'){
      document.getElementById('limitMsg').textContent=d.message||'Piano non attivo.';
      document.getElementById('shell').style.visibility='visible';
      show('phase-limit');return;
    }
    flow=(d.config.questionFlow&&d.config.questionFlow.length>0)?d.config.questionFlow:defaultFlow();
    applyTheme(d.config);populateUI(d.config);
    if(d.generationsRemaining<=0){
      document.getElementById('shell').style.visibility='visible';
      show('phase-limit');return;
    }
    show('phase-hero');
    document.getElementById('shell').style.visibility='visible';
  }catch(e){
    console.error(e);
    document.getElementById('shell').style.visibility='visible';
  }
}

function applyTheme(c){
  const s=document.documentElement.style;
  if(c.primaryColor)   s.setProperty('--p',c.primaryColor);
  if(c.secondaryColor) s.setProperty('--s',c.secondaryColor);
  if(c.bgColor)        s.setProperty('--bg',c.bgColor);
  if(c.textColor)      s.setProperty('--text',c.textColor);
  if(c.buttonColor)    s.setProperty('--btn',c.buttonColor);
  if(c.buttonTextColor)s.setProperty('--btntxt',c.buttonTextColor);
  if(c.borderRadius)   s.setProperty('--r',c.borderRadius);
  if(c.fontFamily){
    const f=c.fontFamily;
    const l=document.createElement('link');l.rel='stylesheet';
    l.href=`https://fonts.googleapis.com/css2?family=${encodeURIComponent(f)}:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,600&display=block`;
    document.head.appendChild(l);
    s.setProperty('--sans',"'"+f+"',sans-serif");
    s.setProperty('--serif',"'"+f+"',Georgia,serif");
    document.body.style.fontFamily="'"+f+"',sans-serif";
  }
}

function populateUI(c){
  document.title=c.brandName||'AI Advisor';
  const bn=document.getElementById('brandName');
  if(c.logoUrl){document.getElementById('brandLogo').src=c.logoUrl;document.getElementById('brandLogo').style.display='block';bn.style.display='none';}
  else bn.textContent=c.brandName||'';
  if(c.heroTitle)document.getElementById('heroTitle').textContent=c.heroTitle;
  if(c.heroSubtitle)document.getElementById('heroSub').textContent=c.heroSubtitle;
  if(c.ctaText)document.getElementById('ctaText').textContent=c.ctaText;
  if(c.loadingText)document.getElementById('loadingText').textContent=c.loadingText;
}

function show(id){
  document.querySelectorAll('.phase').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  prog();
}

function prog(){
  const pct=flow.length>0?Math.round((step/flow.length)*100):0;
  document.getElementById('progressFill').style.width=pct+'%';
}

function renderQ(){
  const s=flow[step];if(!s)return;
  document.getElementById('stepLabel').textContent=`Step ${String(step+1).padStart(2,'0')} — ${flow.length} domande`;
  document.getElementById('qTitle').textContent=s.title;
  const wrap=document.getElementById('opts');
  wrap.innerHTML='';

  const curVal=answers[s.id];
  const sel=Array.isArray(curVal)?curVal:(curVal?[curVal]:[]);

  if(s.type==='text'){
    wrap.classList.add('col1');
    const ta=document.createElement('textarea');
    ta.className='opt';ta.placeholder=s.placeholder||'';ta.value=answers[s.id]||'';
    ta.rows=4;
    ta.addEventListener('input',()=>{answers[s.id]=ta.value;});
    wrap.appendChild(ta);
  } else if(s.type==='slider'){
    wrap.classList.add('col1');
    const val=answers[s.id]||s.min||0;
    const d=document.createElement('div');d.style.cssText='width:100%;padding:8px 0';
    const sl=document.createElement('input');sl.type='range';sl.min=s.min||0;sl.max=s.max||100;sl.value=val;
    sl.style.cssText='width:100%;accent-color:var(--p)';
    const lb=document.createElement('div');lb.textContent=val;lb.style.cssText='text-align:center;font-family:var(--serif);font-size:2.5rem;font-weight:400;font-style:italic;margin-top:8px';
    sl.addEventListener('input',()=>{answers[s.id]=sl.value;lb.textContent=sl.value;});
    d.appendChild(sl);d.appendChild(lb);wrap.appendChild(d);
  } else {
    const long=(s.options||[]).some(o=>o.length>14)||(s.options||[]).length<=3;
    if(long)wrap.classList.add('col1'); else wrap.classList.remove('col1');
    (s.options||[]).forEach(opt=>{
      const btn=document.createElement('button');
      btn.className='opt'+(sel.includes(opt)?' sel':'');
      const txt=document.createElement('span');txt.textContent=opt;
      const dot=document.createElement('span');dot.className='dot';
      dot.innerHTML=sel.includes(opt)?'✓':'';
      btn.appendChild(txt);btn.appendChild(dot);
      btn.addEventListener('click',()=>{
        if(s.type==='multi'){const i=sel.indexOf(opt);if(i>-1)sel.splice(i,1);else sel.push(opt);answers[s.id]=[...sel];}
        else answers[s.id]=opt;
        renderQ();
        if(s.type==='single')setTimeout(next,220);
      });
      wrap.appendChild(btn);
    });
  }
  show('phase-questions');prog();
}

function next(){if(step<flow.length-1){step++;renderQ();}else gen();}
function back(){if(step>0){step--;renderQ();}else show('phase-hero');}

async function gen(){
  show('phase-loading');
  try{
    const r=await fetch(`${API}/api/generate`,{method:'POST',headers:{'Content-Type':'application/json','x-shop-domain':SHOP},body:JSON.stringify({answers,sessionId:SID})});
    const d=await r.json();
    if(d.error==='generation_limit_reached'){show('phase-limit');return;}
    if(!r.ok)throw new Error(d.message||'Errore');
    genId=d.generationId;renderRes(d);show('phase-results');
  }catch(e){alert(e.message||'Errore. Riprova.');show('phase-questions');}
}

function renderRes(data){
  document.getElementById('resIntro').textContent=data.message||'';
  const c=document.getElementById('resContent');c.innerHTML='';

  if(data.sections&&data.sections.length>0){
    data.sections.forEach(sec=>{
      const t=document.createElement('div');t.className='sec-label';t.textContent=sec.title;c.appendChild(t);
      (sec.steps||[]).forEach((s,i)=>{
        const el=document.createElement('div');el.className='step-item';
        el.innerHTML=`<div class="step-n">${String(s.order||i+1).padStart(2,'0')}</div><div><div class="step-act">${s.action}</div>${s.tip?`<div class="step-tip">${s.tip}</div>`:''}</div>`;
        c.appendChild(el);
      });
    });
  }

  if(data.products&&data.products.length>0){
    const lbl=document.createElement('div');lbl.className='sec-label';
    lbl.textContent=data.sections?.length>0?'Prodotti selezionati':'La tua selezione';c.appendChild(lbl);
    data.products.forEach(p=>{
      const card=document.createElement('div');
      card.className='prod-card';
      card.style.cursor='pointer';
      card.innerHTML=`
        ${p.imageUrl?`<img class="prod-img" src="${p.imageUrl}" alt="${p.title}"/>`:'<div class="prod-img"></div>'}
        <div class="prod-info">
          <div class="prod-title">${p.title}</div>
          ${p.reason?`<div class="prod-reason">${p.reason}</div>`:''}
          ${p.price?`<div class="prod-price">€${Number(p.price).toFixed(2)}</div>`:''}
        </div>
        <span class="prod-arrow">→</span>`;
      card.addEventListener('click',()=>{
        trackClick(p);
        if(p.url&&p.url!=='#'){window.open(p.url,'_blank');}
      });
      c.appendChild(card);
    });
  }
}

async function trackClick(p){
  if(!genId)return;
  fetch(`${API}/api/generate/click`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({generationId:genId,shopifyId:p.shopifyId,productTitle:p.title,price:p.price})}).catch(()=>{});
}

function defaultFlow(){return[
  {id:'goal',title:'Qual è il tuo obiettivo principale?',type:'multi',options:['Idratazione','Anti-età','Luminosità','Imperfezioni','Lenitivo']},
  {id:'skintype',title:'Qual è il tuo tipo di pelle?',type:'single',options:['Secca','Normale','Grassa','Mista','Sensibile']},
  {id:'budget',title:'Budget per prodotto?',type:'single',options:['Fino a €20','€20–€40','€40–€60','Oltre €60']},
  {id:'notes',title:'Vuoi aggiungere qualcosa?',type:'text',placeholder:'Allergie, preferenze particolari...'},
];}

document.getElementById('startBtn').addEventListener('click',()=>{step=0;answers={};renderQ();});
document.getElementById('nextBtn').addEventListener('click',next);
document.getElementById('backBtn').addEventListener('click',back);
document.getElementById('restartBtn').addEventListener('click',()=>{step=0;answers={};genId=null;show('phase-hero');});
init();
</script>
</body>
</html>

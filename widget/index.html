<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AI Advisor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#0A0A0A;--secondary:#00E676;--bg:#F7F5F2;--text:#0A0A0A;
  --btn-bg:#0A0A0A;--btn-text:#FFFFFF;--radius:0px;--font:'Inter',sans-serif;
  --border:rgba(0,0,0,0.12);--surface:#FFFFFF;--muted:rgba(0,0,0,0.45);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.widget{display:flex;flex-direction:column;min-height:100vh;max-width:520px;margin:0 auto}
.phase{display:none;flex-direction:column;min-height:100vh}
.phase.active{display:flex}
.progress-bar{height:2px;background:var(--border);width:100%}
.progress-fill{height:100%;background:var(--primary);transition:width .4s ease}
.widget-header{padding:24px 28px 20px;border-bottom:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:space-between}
.brand-logo{max-height:32px;object-fit:contain}
.brand-name{font-size:.75rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--text)}
.header-tag{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:500}
/* HERO */
.hero-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;padding:48px 28px 40px}
.hero-label{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:20px;font-weight:600}
.hero-title{font-size:clamp(1.8rem,5vw,2.6rem);font-weight:800;line-height:1.1;letter-spacing:-.02em;color:var(--primary);margin-bottom:14px}
.hero-title em{font-style:italic;font-weight:800}
.hero-sub{font-size:.92rem;color:var(--muted);line-height:1.7;margin-bottom:40px;max-width:380px}
.cta-btn{display:inline-flex;align-items:center;gap:10px;background:var(--btn-bg);color:var(--btn-text);border:none;padding:16px 32px;font-size:.88rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:opacity .2s;border-radius:var(--radius);max-width:280px}
.cta-btn:hover{opacity:.85}
.cta-btn .arrow{transition:transform .2s}
.cta-btn:hover .arrow{transform:translateX(4px)}
/* QUESTIONS */
.question-wrap{flex:1;display:flex;flex-direction:column;padding:36px 28px 28px}
.step-label{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;font-weight:600}
.question-title{font-size:1.4rem;font-weight:800;line-height:1.25;letter-spacing:-.02em;margin-bottom:28px;color:var(--primary)}
.options{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:auto}
.options.single-col{grid-template-columns:1fr}
.option{display:flex;flex-direction:column;align-items:flex-start;padding:18px 16px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;text-align:left;font-size:.88rem;font-weight:600;color:var(--text);transition:all .15s;border-radius:var(--radius);position:relative;line-height:1.3}
.option .opt-sub{font-size:.75rem;font-weight:400;color:var(--muted);margin-top:4px}
.option:hover{border-color:var(--primary);background:rgba(0,0,0,.03)}
.option.selected{border-color:var(--primary);background:var(--primary);color:var(--btn-text)}
.option.selected .opt-sub{color:rgba(255,255,255,.6)}
.option .check{position:absolute;top:12px;right:12px;width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s}
.option.selected .check{background:var(--btn-text);border-color:var(--btn-text);color:var(--primary)}
.text-input{width:100%;padding:16px;border:1.5px solid var(--border);background:var(--surface);font-size:.9rem;font-family:inherit;resize:vertical;min-height:120px;color:var(--text);border-radius:var(--radius);transition:border-color .15s}
.text-input:focus{outline:none;border-color:var(--primary)}
.nav{display:flex;gap:10px;width:100%;padding-top:24px}
.nav-btn{flex:1;padding:14px;border:1.5px solid var(--border);background:transparent;color:var(--text);font-weight:600;font-size:.82rem;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:.15s;border-radius:var(--radius)}
.nav-btn.primary{background:var(--primary);color:var(--btn-text);border-color:var(--primary)}
.nav-btn:hover:not(:disabled){opacity:.8}
.nav-btn:disabled{opacity:.3;cursor:default}
/* LOADING */
.loading-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center}
.loading-line{width:48px;height:2px;background:var(--border);margin:0 auto 32px;position:relative;overflow:hidden}
.loading-line::after{content:'';position:absolute;left:-100%;top:0;width:100%;height:100%;background:var(--primary);animation:slide 1.2s ease-in-out infinite}
@keyframes slide{0%{left:-100%}100%{left:100%}}
.loading-label{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:12px}
.loading-text{font-size:1.1rem;font-weight:700;color:var(--primary);letter-spacing:-.01em}
/* RESULTS */
.results-wrap{flex:1;padding:28px 28px 40px}
.result-intro{font-size:.9rem;line-height:1.75;color:var(--muted);margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.section-label{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:14px;margin-top:28px}
.section-label:first-child{margin-top:0}
.step-item{display:flex;gap:14px;align-items:flex-start;padding:16px;border:1.5px solid var(--border);background:var(--surface);margin-bottom:8px;border-radius:var(--radius)}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--primary);color:var(--btn-text);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;flex-shrink:0}
.step-action{font-weight:700;font-size:.88rem;line-height:1.3}
.step-tip{font-size:.78rem;color:var(--muted);margin-top:4px;line-height:1.5}
.product-card{display:flex;gap:14px;align-items:flex-start;padding:16px;border:1.5px solid var(--border);background:var(--surface);margin-bottom:8px;text-decoration:none;color:inherit;transition:border-color .15s;cursor:pointer;border-radius:var(--radius)}
.product-card:hover{border-color:var(--primary)}
.product-img{width:60px;height:60px;object-fit:cover;flex-shrink:0;background:var(--bg);border:1px solid var(--border)}
.product-title{font-weight:700;font-size:.88rem;line-height:1.3}
.product-reason{font-size:.78rem;color:var(--muted);margin-top:4px;line-height:1.5}
.product-price{font-weight:800;color:var(--primary);margin-top:8px;font-size:.88rem}
.product-arrow{margin-left:auto;align-self:center;color:var(--muted);flex-shrink:0}
.restart-btn{margin-top:32px;padding:14px 24px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:.78rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:var(--radius);transition:.15s;display:block;width:100%;text-align:center}
.restart-btn:hover{border-color:var(--primary);color:var(--primary)}
.limit-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center}
.limit-title{font-size:1.3rem;font-weight:800;margin-bottom:10px}
.limit-sub{font-size:.88rem;color:var(--muted);line-height:1.7}
</style>
</head>
<body>
<div class="widget">
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  <div class="widget-header" id="header">
    <div>
      <img id="logoImg" class="brand-logo" src="" alt="" style="display:none"/>
      <div id="brandName" class="brand-name"></div>
    </div>
    <div class="header-tag">AI Advisor</div>
  </div>

  <div class="phase active" id="phase-hero">
    <div class="hero-wrap">
      <div class="hero-label">Personalizzazione AI</div>
      <div class="hero-title" id="heroTitle">Trova la tua <em>routine perfetta</em></div>
      <div class="hero-sub" id="heroSub">Personalizzata per te dall'intelligenza artificiale in pochi secondi.</div>
      <button class="cta-btn" id="startBtn"><span id="ctaText">Inizia ora</span><span class="arrow">→</span></button>
    </div>
  </div>

  <div class="phase" id="phase-questions">
    <div class="question-wrap">
      <div class="step-label" id="stepLabel">Step 01</div>
      <div class="question-title" id="questionTitle"></div>
      <div class="options" id="optionsContainer"></div>
      <div class="nav">
        <button class="nav-btn" id="backBtn">← Back</button>
        <button class="nav-btn primary" id="nextBtn">Next →</button>
      </div>
    </div>
  </div>

  <div class="phase" id="phase-loading">
    <div class="loading-wrap">
      <div class="loading-line"></div>
      <div class="loading-label">Analisi in corso</div>
      <div class="loading-text" id="loadingText">Sto analizzando il tuo profilo...</div>
    </div>
  </div>

  <div class="phase" id="phase-results">
    <div class="results-wrap">
      <div class="result-intro" id="resultIntro"></div>
      <div id="resultContent"></div>
      <button class="restart-btn" id="restartBtn">↺ Ricomincia dall'inizio</button>
    </div>
  </div>

  <div class="phase" id="phase-limit">
    <div class="limit-wrap">
      <div class="limit-title">Limite raggiunto</div>
      <div class="limit-sub" id="limitMsg">Il numero di consulenze disponibili è esaurito. Torna presto!</div>
    </div>
  </div>
</div>

<script>
const API='%%API_HOST%%';
const SHOP=new URLSearchParams(location.search).get('shop');
let shopConfig=null,flow=[],answers={},currentStep=0,generationId=null;
const SESSION=Math.random().toString(36).slice(2);

async function init(){
  try{
    const res=await fetch(`${API}/api/widget/config?shop=${SHOP}`);
    const data=await res.json();
    if(data.error==='inactive'||data.error==='plan_inactive'){
      document.getElementById('limitMsg').textContent=data.message||'Piano non attivo.';
      showPhase('phase-limit');return;
    }
    shopConfig=data;
    flow=(data.config.questionFlow&&data.config.questionFlow.length>0)?data.config.questionFlow:defaultFlow();
    applyTheme(data.config);populateUI(data.config);
    if(data.generationsRemaining<=0){showPhase('phase-limit');return;}
    showPhase('phase-hero');
  }catch(e){console.error('Widget init error:',e)}
}

function applyTheme(cfg){
  const r=document.documentElement.style;
  r.setProperty('--primary',cfg.primaryColor||'#0A0A0A');
  r.setProperty('--secondary',cfg.secondaryColor||'#00E676');
  r.setProperty('--bg',cfg.bgColor||'#F7F5F2');
  r.setProperty('--text',cfg.textColor||'#0A0A0A');
  r.setProperty('--btn-bg',cfg.buttonColor||'#0A0A0A');
  r.setProperty('--btn-text',cfg.buttonTextColor||'#FFFFFF');
  r.setProperty('--radius',cfg.borderRadius||'0px');
  r.setProperty('--font',cfg.fontFamily||'Inter');
  document.body.style.fontFamily=cfg.fontFamily||'Inter';
  if(cfg.fontFamily&&cfg.fontFamily!=='Inter'){
    const l=document.createElement('link');l.rel='stylesheet';
    l.href=`https://fonts.googleapis.com/css2?family=${encodeURIComponent(cfg.fontFamily)}:ital,wght@0,400;0,600;0,700;0,800;1,700;1,800&display=swap`;
    document.head.appendChild(l);
  }
}

function populateUI(cfg){
  document.title=cfg.brandName||'AI Advisor';
  document.getElementById('brandName').textContent=cfg.brandName||'';
  const ht=document.getElementById('heroTitle');
  if(cfg.heroTitle)ht.textContent=cfg.heroTitle; else ht.innerHTML='Trova la tua <em>routine perfetta</em>';
  document.getElementById('heroSub').textContent=cfg.heroSubtitle||'';
  document.getElementById('ctaText').textContent=cfg.ctaText||'Inizia ora';
  document.getElementById('loadingText').textContent=cfg.loadingText||'Sto analizzando il tuo profilo...';
  if(cfg.logoUrl){const img=document.getElementById('logoImg');img.src=cfg.logoUrl;img.style.display='block';document.getElementById('brandName').style.display='none';}
}

function showPhase(id){document.querySelectorAll('.phase').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');updateProgress();}
function updateProgress(){const pct=flow.length>0?Math.round((currentStep/flow.length)*100):0;document.getElementById('progress').style.width=pct+'%';}

function renderQuestion(){
  const step=flow[currentStep];if(!step)return;
  document.getElementById('stepLabel').textContent=`Step ${String(currentStep+1).padStart(2,'0')} — ${flow.length} domande`;
  document.getElementById('questionTitle').textContent=step.title;
  const container=document.getElementById('optionsContainer');
  container.innerHTML='';
  if(step.type==='text'){
    container.classList.add('single-col');
    const ta=document.createElement('textarea');ta.className='text-input';
    ta.placeholder=step.placeholder||'';ta.value=answers[step.id]||'';
    ta.addEventListener('input',()=>{answers[step.id]=ta.value;});container.appendChild(ta);
  }else if(step.type==='slider'){
    container.classList.add('single-col');
    const val=answers[step.id]||step.min||0;
    const wrap=document.createElement('div');wrap.style.cssText='width:100%;padding:8px 0';
    const slider=document.createElement('input');slider.type='range';slider.min=step.min||0;slider.max=step.max||100;slider.value=val;
    slider.style.cssText='width:100%;accent-color:var(--primary);margin-bottom:12px';
    const label=document.createElement('div');label.textContent=val;label.style.cssText='text-align:center;font-size:2rem;font-weight:800;letter-spacing:-.03em';
    slider.addEventListener('input',()=>{answers[step.id]=slider.value;label.textContent=slider.value;});
    wrap.appendChild(slider);wrap.appendChild(label);container.appendChild(wrap);
  }else{
    const hasLong=(step.options||[]).some(o=>o.length>16);
    if(hasLong||(step.options||[]).length<=3)container.classList.add('single-col');
    else container.classList.remove('single-col');
    const currentVal=answers[step.id];
    const selected=Array.isArray(currentVal)?currentVal:(currentVal?[currentVal]:[]);
    (step.options||[]).forEach(opt=>{
      const btn=document.createElement('button');
      btn.className='option'+(selected.includes(opt)?' selected':'');
      btn.textContent=opt;
      const check=document.createElement('span');check.className='check';check.textContent=selected.includes(opt)?'✓':'';
      btn.appendChild(check);
      btn.addEventListener('click',()=>{
        if(step.type==='multi'){const idx=selected.indexOf(opt);if(idx>-1)selected.splice(idx,1);else selected.push(opt);answers[step.id]=[...selected];}
        else{answers[step.id]=opt;}
        renderQuestion();
        if(step.type==='single')setTimeout(()=>nextStep(),240);
      });
      container.appendChild(btn);
    });
  }
  showPhase('phase-questions');updateProgress();
}

function nextStep(){if(currentStep<flow.length-1){currentStep++;renderQuestion();}else{generate();}}
function prevStep(){if(currentStep>0){currentStep--;renderQuestion();}else showPhase('phase-hero');}

async function generate(){
  showPhase('phase-loading');
  try{
    const res=await fetch(`${API}/api/generate`,{method:'POST',headers:{'Content-Type':'application/json','x-shop-domain':SHOP},body:JSON.stringify({answers,sessionId:SESSION})});
    const data=await res.json();
    if(data.error==='generation_limit_reached'){showPhase('phase-limit');return;}
    if(!res.ok)throw new Error(data.message||'Errore generazione');
    generationId=data.generationId;renderResults(data);showPhase('phase-results');
  }catch(e){alert(e.message||'Si è verificato un errore. Riprova.');showPhase('phase-questions');}
}

function renderResults(data){
  document.getElementById('resultIntro').textContent=data.message||'';
  const content=document.getElementById('resultContent');content.innerHTML='';
  if(data.sections&&data.sections.length>0){
    data.sections.forEach(section=>{
      const t=document.createElement('div');t.className='section-label';t.textContent=section.title;content.appendChild(t);
      (section.steps||[]).forEach((step,i)=>{
        const item=document.createElement('div');item.className='step-item';
        item.innerHTML=`<div class="step-num">${String(step.order||i+1).padStart(2,'0')}</div><div><div class="step-action">${step.action}</div>${step.tip?`<div class="step-tip">${step.tip}</div>`:''}</div>`;
        content.appendChild(item);
      });
    });
  }
  if(data.products&&data.products.length>0){
    const pl=document.createElement('div');pl.className='section-label';
    pl.textContent=data.sections?.length>0?'Prodotti selezionati':'La tua selezione';content.appendChild(pl);
    data.products.forEach(product=>{
      const card=document.createElement('a');card.className='product-card';card.href=product.url;card.target='_top';
      card.innerHTML=`${product.imageUrl?`<img class="product-img" src="${product.imageUrl}" alt="${product.title}"/>`:'<div class="product-img"></div>'}<div style="flex:1"><div class="product-title">${product.title}</div>${product.reason?`<div class="product-reason">${product.reason}</div>`:''} ${product.price?`<div class="product-price">€${product.price.toFixed(2)}</div>`:''}</div><span class="product-arrow">→</span>`;
      card.addEventListener('click',()=>trackClick(product));content.appendChild(card);
    });
  }
}

async function trackClick(product){
  if(!generationId)return;
  fetch(`${API}/api/generate/click`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({generationId,shopifyId:product.shopifyId,productTitle:product.title,price:product.price})}).catch(()=>{});
}

function defaultFlow(){return[
  {id:'goal',title:'What is your main goal?',type:'multi',options:['Hydration','Anti-aging','Radiance','Imperfections','Soothing']},
  {id:'skintype',title:'What is your skin type?',type:'single',options:['Dry','Normal','Oily','Combination','Sensitive']},
  {id:'budget',title:'Budget per product?',type:'single',options:['Up to €20','€20–€40','€40–€60','Over €60']},
  {id:'notes',title:'Anything else to add?',type:'text',placeholder:'Allergies, preferences...'},
];}

document.getElementById('startBtn').addEventListener('click',()=>{currentStep=0;answers={};renderQuestion();});
document.getElementById('nextBtn').addEventListener('click',nextStep);
document.getElementById('backBtn').addEventListener('click',prevStep);
document.getElementById('restartBtn').addEventListener('click',()=>{currentStep=0;answers={};generationId=null;showPhase('phase-hero');});
init();
</script>
</body>
</html>
